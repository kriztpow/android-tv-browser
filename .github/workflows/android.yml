name: Android Build

on:
  push:
    branches: [ main ]  # Cambia a 'master' si tu rama principal es esa
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build with Gradlex
        run:  ./gradlew clean

       -name: vergacion
        run:  ./gradlew assembleDebug

      - name: Build with Gradle
        run:  ./gradlew build

      - name: Upload APK artifact (opcional)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
