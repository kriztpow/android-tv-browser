name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        # Esto asegura que los permisos de archivo se mantengan correctamente
        persist-credentials: false

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: |
        # Asegurar que gradlew tenga permisos de ejecución
        chmod +x ./gradlew
        # Verificar los permisos
        ls -la gradlew

    - name: Verify Gradle Wrapper
      run: |
        # Verificar que el wrapper de Gradle esté correctamente configurado
        ./gradlew --version

    - name: Clean and Build
  shell: bash
  run: ./gradlew clean build --no-daemon

    - name: List tasks (para verificación)
      run: |
        # Listar tareas disponibles para verificar la configuración
        ./gradlew tasks --no-daemon
